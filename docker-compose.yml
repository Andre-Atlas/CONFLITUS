version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: conflitus-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Volume para persistir a base de dados SQLite
      - sqlite_data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: conflitus-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - BACKEND_URL=http://backend:8000
    env_file:
      - .env
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sqlite_data: